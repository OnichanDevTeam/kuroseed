appId: com.kuroseed.app
productName: KuroSeed
copyright: Copyright © 2024

directories:
  output: dist

files:
  - "**/*"
  - "!dist/**"
  - "!downloads/**"
  - "!torrents/**"
  - "!*.db"
  - "!*.db-shm"
  - "!*.db-wal"
  - "!docs/**"
  - "!.git/**"

asar: true
npmRebuild: true
buildDependenciesFromSource: true

icon: build/icon.png
afterPack: ./scripts/after-pack.js

mac:
  category: public.app-category.utilities
  target:
    - dmg
    - zip

win:
  target:
    - portable
  signAndEditExecutable: false

linux:
  target:
    - AppImage
  category: Utility
